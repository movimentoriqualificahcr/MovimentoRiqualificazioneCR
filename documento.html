<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Documento</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Torna alla lista</a>
        <h1>Dettaglio Documento</h1>
    </header>

    <main style="display: flex; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto;">
        <aside style="flex: 0 0 300px; background: white; padding: 25px; border-radius: 12px; height: fit-content; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div id="info-testo"></div>
            <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <h4 style="color: #003366; font-size: 0.8rem; text-transform: uppercase; margin-bottom:15px;">Documenti Correlati</h4>
                <div id="sidebar-correlati"></div>
            </div>
        </aside>

        <section style="flex: 1; background: white; border-radius: 12px; overflow: hidden; min-height: 85vh; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <div id="pdf-viewer" style="width: 100%; height: 100%;"></div>
        </section>
    </main>

    <script>
        const _supabase = supabase.createClient('https://ovfufqbpgxpmfxpbhjfn.supabase.co', 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz');
        const docId = new URLSearchParams(window.location.search).get('id');

        async function caricaDettaglio() {
            const { data: d } = await _supabase.from('documenti').select('*').eq('id', docId).single();
            if (d) {
                document.getElementById('info-testo').innerHTML = `
                    <p style="color: #28a745; font-weight: bold; font-size: 0.75rem; margin-bottom:5px;">${d.argomento}</p>
                    <h2 style="color: #003366; margin:0 0 15px 0;">${d.titolo}</h2>
                    <p style="margin:5px 0;"><strong>Autore:</strong> ${d.autore}</p>
                    <p style="margin:5px 0;"><strong>Data:</strong> ${d.data}</p>
                `;

                if (d.pdf_url) {
                    const { data: urlData } = _supabase.storage.from('pdf_riservati').getPublicUrl(d.pdf_url);
                    document.getElementById('pdf-viewer').innerHTML = `<embed src="${urlData.publicUrl}" type="application/pdf" width="100%" height="100%" />`;
                }

                if (d.correlati?.length > 0) {
                    const { data: correlati } = await _supabase.from('documenti').select('id, titolo, data').in('id', d.correlati);
                    if (correlati) {
                        document.getElementById('sidebar-correlati').innerHTML = correlati.map(c => `
                            <a href="documento.html?id=${c.id}" style="display:block; text-decoration:none; margin-bottom:15px;">
                                <span style="display:block; color:#003366; font-weight:bold; font-size:0.9rem;">📄 ${c.titolo}</span>
                                <span style="font-size:0.75rem; color:#888;">Data: ${c.data}</span>
                            </a>`).join('');
                    }
                }
            }
        }
        window.onload = caricaDettaglio;
    </script>
</body>
</html>
