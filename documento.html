<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Dettaglio Documento</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .doc-container {
            max-width: 850px;
            margin: 30px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .doc-content {
            line-height: 1.7;
            color: #333;
            font-size: 1.1rem;
        }

        .doc-content h3 {
            color: #003366;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
            margin-top: 30px;
        }
    </style>
</head>

<body class="home-page">
    <main>
        <div class="doc-container">
            <a href="index.html" style="text-decoration:none; color:#003366; font-weight:bold;">← Torna alla lista</a>
            <div id="documento-dettaglio"></div>
        </div>
    </main>
    <script>
        const SUPABASE_URL = 'https://ovfufqbpgxpmfxpbhjfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function () {
            const id = new URLSearchParams(window.location.search).get('id');
            const { data } = await _supabase.from('documenti').select('*').eq('id', id).single();
            const container = document.getElementById('documento-dettaglio');

            if (data) {
                container.innerHTML = `
                    <div style="border-bottom: 2px solid #eee; margin: 20px 0; padding-bottom: 20px;">
                        <span style="color: #28a745; font-weight: bold;">${data.argomento}</span>
                        <h2 style="color: #003366; margin: 10px 0;">${data.titolo}</h2>
                        <p style="color: #666;"><strong>Autore:</strong> ${data.autore} | <strong>Data:</strong> ${data.data}</p>
                    </div>
                    <div class="doc-content">${data.testo_completo}</div>`;
            }
        }
    </script>
</body>

</html>
