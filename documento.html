<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Dettaglio Documento</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Blocco dello scorrimento esterno */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: #f0f2f5;
        }

        header {
            flex: 0 0 auto;
            margin: 0;
            padding: 12px 0;
            z-index: 1000;
            position: relative;
        }

        main {
            flex: 1;
            display: flex;
            padding: 5px 20px 20px 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .doc-container {
            display: flex;
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        /* Sidebar dati a sinistra */
        .sidebar-data {
            flex: 0 0 200px;
            padding: 25px 20px;
            border-right: 1px solid #f0f0f0;
            overflow-y: auto;
        }

        /* Area principale a destra */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }

        .doc-content {
            padding: 25px 25px 10px 25px;
            line-height: 1.6;
            color: #333;
            font-size: 1rem;
            flex: 0 0 auto;
        }

        /* Wrapper per eliminare barra verticale E orizzontale */
        .pdf-mask {
            flex: 1;
            margin: 10px 25px 25px 25px;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid #ddd;
            position: relative;
        }

        iframe {
            width: calc(100% + 20px);
            height: 100%;
            border: none;
            display: block;
            position: absolute;
            left: 0;
            top: 0;
        }

        .btn-back-header {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .btn-back-header:hover {
            background: white;
            color: #003366;
        }

        /* Stile per i link correlati */
        .correlati-link {
            text-decoration: none;
            color: #0056b3;
            font-size: 0.85rem;
            font-weight: bold;
            display: block;
            margin-bottom: 12px;
            line-height: 1.3;
            transition: 0.2s;
        }

        .correlati-link:hover {
            color: #003366;
            text-decoration: underline;
        }
    </style>
</head>

<body class="home-page">
    <header>
        <a href="index.html" class="btn-back-header">← Torna alla lista</a>
        <h1 style="margin: 0; text-align: center;">Movimento per la riqualificazione<br> dell'ospedale di Cremona</h1>
    </header>

    <main>
        <div class="doc-container" id="documento-container">
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://ovfufqbpgxpmfxpbhjfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function () {
            const id = new URLSearchParams(window.location.search).get('id');
            const { data, error } = await _supabase.from('documenti').select('*').eq('id', id).single();
            const container = document.getElementById('documento-container');

            if (data) {
                // RECUPERO DOCUMENTI CORRELATI
     // Recupero e visualizzazione documenti correlati con data
let correlatiHtml = "";
if (data.correlati && data.correlati.length > 0) {
    const { data: docsCorrelati } = await _supabase
        .from('documenti')
        .select('id, titolo, data') // Assicurati di selezionare anche il campo 'data'
        .in('id', data.correlati);

    if (docsCorrelati && docsCorrelati.length > 0) {
        correlatiHtml = `
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
                <h4 style="font-size: 0.8rem; color: #003366; text-transform: uppercase; margin-bottom: 12px;">Documenti Correlati</h4>
                ${docsCorrelati.map(dc => `
                    <a href="documento.html?id=${dc.id}" class="correlati-link" style="margin-bottom: 15px; display: block;">
                        <span style="display: block;">📄 ${dc.titolo}</span>
                        <span style="font-size: 0.75rem; color: #888; margin-left: 22px;">Data: ${dc.data || 'N/D'}</span>
                    </a>
                `).join('')}
            </div>`;
    }
}

                let pdfSection = "";
                if (data.pdf_url) {
                    const { data: publicUrlData } = _supabase.storage
                        .from('pdf_riservati')
                        .getPublicUrl(data.pdf_url);

                    const cleanPdfUrl = publicUrlData.publicUrl + "#toolbar=0&navpanes=0&scrollbar=0&view=FitH";

                    pdfSection = `
                        <div class="pdf-mask">
                            <iframe src="${cleanPdfUrl}" scrolling="no"></iframe>
                        </div>`;
                }

                container.innerHTML = `
                    <div class="sidebar-data">
                        <span style="color: #28a745; font-weight: bold; font-size: 0.8rem; text-transform: uppercase;">${data.argomento}</span>
                        <h2 style="color: #003366; margin: 10px 0; font-size: 1.3rem; line-height: 1.2;">${data.titolo}</h2>
                        <div style="margin-top: 15px; font-size: 0.85rem; color: #555;">
                            <p><strong>Autore:</strong><br>${data.autore}</p>
                            <p><strong>Data:</strong><br>${data.data}</p>
                        </div>
                        
                        ${correlatiHtml}
                    </div>
                    
                    <div class="main-content">
                        ${data.testo_completo ? `<div class="doc-content">${data.testo_completo}</div>` : ''}
                        ${pdfSection}
                    </div>`;
            } else {
                container.innerHTML = "<h3 style='padding: 20px;'>Documento non trovato</h3>";
            }
        }
    </script>
</body>

</html>
