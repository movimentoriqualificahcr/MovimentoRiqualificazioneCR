<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Area Manager - Ospedale Cremona</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Container Notifiche Overlay */
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 4000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .notification-toast { background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border-left: 5px solid #d9534f; min-width: 280px; opacity: 0; transform: translateX(50px); transition: 0.4s; pointer-events: auto; display: flex; align-items: start; gap: 12px; }
        .notification-toast.show { opacity: 1; transform: translateX(0); }
        .toast-icon { font-size: 1.4rem; }
        .toast-title { font-weight: bold; color: #003366; font-size: 0.95rem; }
        .toast-message { font-size: 0.85rem; color: #666; }

        /* Card di Login Centrata */
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #eee;
        }

        .login-card h1 { 
            color: #003366; 
            font-size: 1.5rem; 
            margin-bottom: 10px; 
        }

        .login-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            color: #003366;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #003366;
            box-shadow: 0 0 0 3px rgba(0,51,102,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        .link-back {
            display: inline-block;
            margin-top: 25px;
            color: #003366;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .link-back:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div class="login-card">
        <h1>Area Manager</h1>
        <p>Inserisci le tue credenziali per gestire i documenti dell'ospedale.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Istituzionale</label>
                <input type="email" id="email" placeholder="nome@esempio.it" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-login" id="btnLogin">Accedi Ora</button>
        </form>
        
        <a href="index.html" class="link-back">← Torna al sito pubblico</a>
    </div>

    <script>
        const _supabase = supabase.createClient('https://ovfufqbpgxpmfxpbhjfn.supabase.co', 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz');

        function showNotification(title, message) {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = 'notification-toast show';
            toast.innerHTML = `<span class="toast-icon">⚠️</span><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 4000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerText = "Verifica in corso...";

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                showNotification("Accesso Negato", "Email o password non corretti. Riprova.");
                btn.disabled = false;
                btn.innerText = "Accedi Ora";
            } else {
                window.location.href = 'manager-dashboard.html';
            }
        });
    </script>
</body>
</html>
