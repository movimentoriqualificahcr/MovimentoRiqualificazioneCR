<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            color: #003366;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #002244;
        }

        #error-msg {
            color: #d9534f;
            background: #fdf2f2;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="btn-back-header" style="position: absolute; left: 20px; top: 20px; color: white; text-decoration: none; border: 1px solid rgba(255,255,255,0.4); padding: 8px 15px; border-radius: 8px;">← Torna al sito</a>
        <h1 style="margin-top: 50px;">Accesso Riservato Manager</h1>
    </header>

    <div class="login-container">
        <div class="login-card">
            <h2>Login</h2>
            <p>Inserisci le tue credenziali registrate su Supabase</p>

            <div id="error-msg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email (es: nome@mail.it)" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login">Accedi</button>
            </form>
        </div>
    </div>

    <script>
        // Configurazione Supabase
        const SUPABASE_URL = 'https://ovfufqbpgxpmfxpbhjfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Chiamata ufficiale al sistema di autenticazione di Supabase
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                // Se le credenziali non sono corrette su Supabase
                errorMsg.innerText = "Accesso negato: " + error.message;
                errorMsg.style.display = 'block';
            } else {
                // Se il login ha successo, Supabase crea una sessione sicura
                window.location.replace("manager-dashboard.html");
            }
        });
    </script>
</body>

</html>
