<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sovrascrittura locale per ridimensionare il box di login */
        .login-box {
            max-width: 400px;
            /* Ridotto per un aspetto più compatto */
            width: 90%;
            margin: 0 auto;
            padding: 30px;
        }

        .login-box h2 {
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .login-box p {
            margin-bottom: 25px;
            color: #666;
            font-size: 0.9rem;
        }

        .form-group input {
            padding: 10px 15px;
            /* Padding ridotto */
            font-size: 0.95rem;
        }

        .btn-accedi {
            padding: 12px;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>

<body class="home-page">
    <header>
        <a href="index.html" class="btn-back">← Torna alla Dashboard</a>
        <h1>Accesso Riservato Manager</h1>
    </header>

    <main class="layout-container">
        <div class="volume-section login-box">
            <h2>Login</h2>
            <p>Inserisci le credenziali (admin / 12345)</p>
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="user" placeholder="Username" required
                        style="width:100%; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
                </div>
                <div class="form-group">
                    <input type="password" id="pass" placeholder="Password" required
                        style="width:100%; margin-bottom:20px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
                </div>
                <button type="submit" class="contact-item btn-accedi"
                    style="width:100%; border:none; cursor:pointer; justify-content:center; background: #003366;">Accedi</button>
            </form>
            <p id="error" style="color: red; display: none; margin-top: 15px; font-weight: bold;">Credenziali errate!
            </p>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === 'admin' && p === '12345') {
                localStorage.setItem('role', 'manager');
                window.location.replace("manager-dashboard.html");
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>
</body>

</html>
