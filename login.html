<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Sovrascrittura locale per ridimensionare il box di login */
        .login-box {
            max-width: 400px;
            width: 90%;
            margin: 0 auto;
            padding: 30px;
        }

        .login-box h2 {
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .login-box p {
            margin-bottom: 25px;
            color: #666;
            font-size: 0.9rem;
        }

        .form-group input {
            padding: 10px 15px;
            font-size: 0.95rem;
        }

        .btn-accedi {
            padding: 12px;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>

<body class="home-page">
    <header>
        <a href="index.html" class="btn-back">← Torna al sito</a>
        <h1>Accesso Riservato Manager</h1>
    </header>

    <main class="layout-container">
        <div class="volume-section login-box">
            <h2>Login</h2>
            <p>Inserisci la tua email e password di Supabase</p>
            <form id="loginForm">
                <div class="form-group">
                    <input type="email" id="user" placeholder="Email (es: nome@mail.it)" required
                        style="width:100%; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
                </div>
                <div class="form-group">
                    <input type="password" id="pass" placeholder="Password" required
                        style="width:100%; margin-bottom:20px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
                </div>
                <button type="submit" class="contact-item btn-accedi"
                    style="width:100%; border:none; cursor:pointer; justify-content:center; background: #003366;">Accedi</button>
            </form>
            <p id="error" style="color: red; display: none; margin-top: 15px; font-weight: bold;">Accesso negato! Controlla i dati.</p>
        </div>
    </main>

    <script>
        // Configurazione Supabase
        const SUPABASE_URL = 'https://ovfufqbpgxpmfxpbhjfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorElement = document.getElementById('error');
            errorElement.style.display = 'none';

            const email = document.getElementById('user').value;
            const password = document.getElementById('pass').value;

            // Chiamata ufficiale al sistema di autenticazione di Supabase
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                // Se le credenziali non sono corrette su Supabase
                errorElement.innerText = "Errore: " + error.message;
                errorElement.style.display = 'block';
            } else {
                // Se il login ha successo, Supabase crea una sessione sicura nel browser
                window.location.replace("manager-dashboard.html");
            }
        });
    </script>
</body>

</html>
