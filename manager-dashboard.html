<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Area Manager - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .toolbar {
            display: flex;
            gap: 5px;
            background: #f8f9fa;
            padding: 8px;
            border: 1px solid #ddd;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            margin-top: 10px;
        }

        .toolbar button {
            padding: 5px 10px;
            cursor: pointer;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .toolbar button:hover {
            background: #e9ecef;
        }

        .card {
            position: relative;
        }

        /* Stile per il selettore dei documenti correlati */
        .select-correlati {
            width: 100%;
            height: 100px;
            margin: 8px 0;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 0.85rem;
            background-color: white;
        }
    </style>
</head>

<body class="home-page">
    <header>
        <h1 style="margin: 0;">Movimento per la riqualificazione<br> dell'ospedale di Cremona</h1>
        <div class="header-contacts-extreme">
            <a href="#" onclick="logout()" class="login-sub-link" style="color: #d9534f; font-weight: bold;">Esci (Manager) 🚪</a>
        </div>
    </header>

    <main>
        <div class="filter-container" style="display: flex; gap: 10px; justify-content: center; margin: 20px 0;">
            <input type="text" id="cercaManager" placeholder="Cerca nei tuoi documenti..." style="padding: 10px; border-radius: 20px; border: 1px solid #ddd; width: 300px;">
        </div>

        <div class="grid-dashboard" id="main-grid">
            </div>

        <div id="modalDocumento" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center;">
            <div class="volume-section" style="max-width: 700px; width: 95%; padding: 25px; border-radius: 20px; overflow-y: auto; max-height: 90vh; background: white;">
                <h3 id="modalTitle" style="margin:0; color: #003366;">Gestione Documento</h3>
                <input type="hidden" id="editId">
                
                <input type="text" id="newTitolo" placeholder="Titolo Documento" style="width:100%; margin:15px 0 8px 0; padding:12px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box; font-weight: bold;">
                
                <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                    <input type="text" id="newAutore" placeholder="Autore" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="newArg" placeholder="Argomento" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                </div>

                <input type="text" id="newDataManuale" placeholder="Data (es. Marzo 2026)" style="width:100%; margin-bottom:15px; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">

                <label style="font-size: 0.8rem; color: #666; display: block; text-align: left; margin-bottom: 5px;">Collega altri documenti (Tieni premuto Ctrl per selezioni multiple):</label>
                <select id="newCorrelati" class="select-correlati" multiple>
                    </select>

                <div style="margin: 15px 0; text-align: left; border: 1px dashed #ccc; padding: 10px; border-radius: 8px;">
                    <label style="font-size: 0.8rem; color: #666; font-weight: bold;">Allega file PDF:</label>
                    <input type="file" id="newFile" accept=".pdf" style="width:100%; margin-top: 5px;">
                </div>

                <div class="toolbar">
                    <button onclick="insertTag('h3')">Titolo H3</button>
                    <button onclick="insertTag('p')">Paragrafo</button>
                    <button onclick="insertTag('strong')">Grassetto</button>
                    <button onclick="insertTag('ul')">Lista</button>
                </div>
                <textarea id="newTesto" placeholder="Inserisci qui il testo descrittivo del documento..." style="width:100%; padding:12px; border:1px solid #ddd; height: 150px; box-sizing:border-box; border-radius: 0 0 8px 8px;"></textarea>

                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="salvaOnline()" class="contact-item" style="background:#28a745; flex:2; padding:15px; border:none; color:white; font-weight:bold; cursor:pointer; border-radius: 8px;">Salva Documento</button>
                    <button onclick="chiudiModal()" class="contact-item" style="background:#6c757d; flex:1; padding:15px; border:none; color:white; font-weight:bold; cursor:pointer; border-radius: 8px;">Annulla</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://ovfufqbpgxpmfxpbhjfn.supabase.co', 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz');
        let docsGlobali = [];

        window.onload = async function () {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace("login.html"); return; }
            rendering();
        }

        async function logout() { 
            await _supabase.auth.signOut(); 
            window.location.replace("index.html"); 
        }

        async function rendering() {
            const { data, error } = await _supabase.from('documenti').select('*').order('timestamp', { ascending: false });
            docsGlobali = data || [];
            const grid = document.getElementById('main-grid');
            
            let html = `
                <div class="card" onclick="apriModal()" style="cursor:pointer; background:#f8f9fa; border: 2px dashed #003366; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 250px;">
                    <div style="font-size: 3rem; color: #003366;">➕</div>
                    <h3 style="color: #003366;">Aggiungi Nuovo</h3>
                </div>`;

            if (data) {
                html += data.map(d => `
                    <div class="card" style="padding:20px; text-align:center; display: flex; flex-direction: column; min-height: 250px;">
                        <button onclick="eliminaDoc('${d.id}')" style="position:absolute; top:10px; right:10px; background:#d9534f; color:white; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-weight: bold;">✕</button>
                        <div style="font-size: 2.5rem; margin-bottom: 10px;">📄</div>
                        <h3 style="font-size: 1.1rem; margin-bottom: 10px;">${d.titolo}</h3>
                        <p style="font-size: 0.85rem; color: #666; margin-bottom: 15px;">
                            ${d.argomento}<br><strong>${d.autore}</strong><br>${d.data}
                        </p>
                        <button onclick="preparaModifica('${d.id}')" class="contact-item" style="margin-top:auto; background:#003366; width:100%; justify-content:center; border:none; cursor:pointer; padding: 10px;">Gestione →</button>
                    </div>`).join('');
            }
            grid.innerHTML = html;
        }

        function popolaSelettoreCorrelati(selezionati = []) {
            const select = document.getElementById('newCorrelati');
            const idCorrente = document.getElementById('editId').value;
            
            // Filtriamo il documento corrente per non collegarlo a se stesso
            const opzioni = docsGlobali.filter(d => d.id !== idCorrente);
            
            select.innerHTML = opzioni.map(d => `
                <option value="${d.id}" ${selezionati.includes(d.id) ? 'selected' : ''}>
                    ${d.titolo} (${d.data})
                </option>
            `).join('');
        }

        async function salvaOnline() {
            const file = document.getElementById('newFile').files[0];
            let pdfPath = null;

            if (file) {
                const fileName = `${Date.now()}_${file.name.replace(/\s/g, '_')}`;
                const { data: upData, error: upErr } = await _supabase.storage
                    .from('pdf_riservati')
                    .upload(fileName, file);
                if (!upErr) pdfPath = fileName;
                else { alert("Errore caricamento PDF: " + upErr.message); return; }
            }

            // Recupera ID dei documenti correlati selezionati
            const correlatiIds = Array.from(document.getElementById('newCorrelati').selectedOptions).map(o => o.value);
            
            const payload = {
                titolo: document.getElementById('newTitolo').value,
                autore: document.getElementById('newAutore').value || "Redazione",
                argomento: document.getElementById('newArg').value || "Documentazione",
                data: document.getElementById('newDataManuale').value || new Date().toLocaleDateString('it-IT'),
                testo_completo: document.getElementById('newTesto').value,
                correlati: correlatiIds, // Salvataggio array ID
                timestamp: Date.now()
            };

            if (pdfPath) payload.pdf_url = pdfPath;
            
            const id = document.getElementById('editId').value;
            let result;

            if (id) {
                result = await _supabase.from('documenti').update(payload).eq('id', id);
            } else {
                result = await _supabase.from('documenti').insert([payload]);
            }

            if (result.error) {
                alert("Errore nel salvataggio: " + result.error.message);
            } else {
                chiudiModal();
                rendering();
            }
        }

        async function preparaModifica(id) {
            const { data } = await _supabase.from('documenti').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('editId').value = data.id;
                document.getElementById('newTitolo').value = data.titolo;
                document.getElementById('newAutore').value = data.autore;
                document.getElementById('newArg').value = data.argomento;
                document.getElementById('newDataManuale').value = data.data;
                document.getElementById('newTesto').value = data.testo_completo || "";
                
                popolaSelettoreCorrelati(data.correlati || []);
                document.getElementById('modalTitle').innerText = "Modifica Documento";
                document.getElementById('modalDocumento').style.display = 'flex';
            }
        }

        function apriModal() {
            document.getElementById('editId').value = "";
            document.getElementById('newTitolo').value = "";
            document.getElementById('newAutore').value = "";
            document.getElementById('newArg').value = "";
            document.getElementById('newDataManuale').value = "";
            document.getElementById('newTesto').value = "";
            document.getElementById('newFile').value = "";
            
            popolaSelettoreCorrelati([]);
            document.getElementById('modalTitle').innerText = "Nuovo Documento";
            document.getElementById('modalDocumento').style.display = 'flex';
        }

        function chiudiModal() { 
            document.getElementById('modalDocumento').style.display = 'none'; 
        }

        async function eliminaDoc(id) {
            if (confirm("Sei sicuro di voler eliminare questo documento definitivamente?")) {
                const { error } = await _supabase.from('documenti').delete().eq('id', id);
                if (error) alert("Errore: " + error.message);
                rendering();
            }
        }

        function insertTag(t) {
            const a = document.getElementById('newTesto');
            const s = a.selectionStart;
            const e = a.selectionEnd;
            const txt = a.value;
            a.value = txt.substring(0, s) + `<${t}>` + txt.substring(s, e) + `</${t}>` + txt.substring(e);
        }

        // Filtro di ricerca semplice per il manager
        document.getElementById('cercaManager').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.grid-dashboard .card').forEach(card => {
                if (card.onclick && card.onclick.name === "apriModal") return; // Salta la card "Nuovo"
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? "flex" : "none";
            });
        });
    </script>
</body>

</html>
