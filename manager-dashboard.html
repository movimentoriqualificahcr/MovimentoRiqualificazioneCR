<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Area Manager - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Correzione Layout Modal per renderlo largo e moderno */
        #modalDocumento {
            display:none; 
            position:fixed; 
            top:0; 
            left:0; 
            width:100%; 
            height:100%; 
            background:rgba(0,0,0,0.7); 
            z-index:2000; 
            justify-content:center; 
            align-items:center;
            padding: 20px;
        }

        .modal-content-box {
            background: white;
            width: 100%;
            max-width: 850px; /* Larghezza aumentata per evitare l'effetto stretto */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .input-full {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .row input {
            flex: 1;
        }

        /* Stile selettore multiplo correlati */
        .select-correlati {
            width: 100%;
            height: 110px;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fdfdfd;
            font-size: 0.9rem;
        }

        .toolbar {
            display: flex;
            gap: 5px;
            background: #f1f1f1;
            padding: 10px;
            border: 1px solid #ddd;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }

        .toolbar button {
            padding: 5px 12px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 0 0 8px 8px;
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
        }
    </style>
</head>

<body class="home-page">
    <header>
        <h1 style="margin: 0;">Movimento per la riqualificazione<br> dell'ospedale di Cremona</h1>
        <div class="header-contacts-extreme">
             <a href="#" onclick="logout()" class="contact-item" style="background:#d9534f; border:none;">Esci Manager 🚪</a>
        </div>
    </header>

    <main>
        <div class="grid-dashboard" id="main-grid" style="margin-top: 30px;"></div>

        <div id="modalDocumento">
            <div class="modal-content-box">
                <h2 id="modalTitle" style="margin-top:0; color: #003366; text-align: center;">Gestione Documento</h2>
                <input type="hidden" id="editId">

                <label style="font-weight: bold; font-size: 0.9rem;">Titolo principale</label>
                <input type="text" id="newTitolo" class="input-full" placeholder="Es: Analisi Ambientale Fase 1">

                <div class="row">
                    <div>
                        <label style="font-weight: bold; font-size: 0.9rem;">Autore</label>
                        <input type="text" id="newAutore" class="input-full" placeholder="Nome o Ente">
                    </div>
                    <div>
                        <label style="font-weight: bold; font-size: 0.9rem;">Argomento</label>
                        <input type="text" id="newArg" class="input-full" placeholder="Es: Urbanistica">
                    </div>
                </div>

                <label style="font-weight: bold; font-size: 0.9rem;">Data o Anno di riferimento</label>
                <input type="text" id="newDataManuale" class="input-full" placeholder="Es: Marzo 2026 o 06/03/2026">

                <label style="font-weight: bold; font-size: 0.9rem; color: #003366;">🔗 Collega Documenti Correlati (Ctrl+Click per più file)</label>
                <select id="newCorrelati" class="select-correlati" multiple></select>

                <label style="font-weight: bold; font-size: 0.9rem; display: block; margin-top: 15px;">Carica allegato PDF</label>
                <input type="file" id="newFile" accept=".pdf" style="margin-bottom: 20px;">

                <div class="toolbar">
                    <button onclick="insertTag('h3')">Titolo Sezione</button>
                    <button onclick="insertTag('p')">Paragrafo</button>
                    <button onclick="insertTag('ul')">Lista</button>
                    <button onclick="insertTag('li')">Punto Elenco</button>
                </div>
                <textarea id="newTesto" placeholder="Inserisci il contenuto descrittivo qui..."></textarea>

                <div style="display:flex; gap:15px; margin-top:25px;">
                    <button onclick="salvaOnline()" class="contact-item" style="background:#28a745; flex:2; justify-content:center; padding: 15px; font-size: 1rem;">Salva Documento Online</button>
                    <button onclick="chiudiModal()" class="contact-item" style="background:#6c757d; flex:1; justify-content:center; padding: 15px; font-size: 1rem;">Chiudi</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://ovfufqbpgxpmfxpbhjfn.supabase.co', 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz');
        let docsGlobali = [];

        window.onload = async function () {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace("login.html"); return; }
            rendering();
        }

        async function logout() { await _supabase.auth.signOut(); window.location.replace("index.html"); }

        async function rendering() {
            const { data } = await _supabase.from('documenti').select('*').order('timestamp', { ascending: false });
            docsGlobali = data || [];
            const grid = document.getElementById('main-grid');
            let html = `<div class="card" onclick="apriModal()" style="cursor:pointer; border: 2px dashed #28a745; background: #f9fff9;">
                            <div style="font-size: 3rem; color: #28a745;">+</div>
                            <h3 style="color: #28a745;">Aggiungi Nuovo</h3>
                        </div>`;
            if (data) {
                html += data.map(d => `
                    <div class="card">
                        <button onclick="eliminaDoc('${d.id}')" style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; border-radius:50%; width:25px; height:25px; cursor:pointer;">✕</button>
                        <div style="font-size: 2.2rem;">📄</div>
                        <h3>${d.titolo}</h3>
                        <p style="font-size:0.8rem; color:#666;">${d.argomento} - ${d.autore}<br>${d.data}</p>
                        <button onclick="preparaModifica('${d.id}')" class="contact-item" style="width:100%; justify-content:center; background:#003366; margin-top:auto;">Gestione →</button>
                    </div>`).join('');
            }
            grid.innerHTML = html;
        }

        function popolaSelettore(selezionati = []) {
            const s = document.getElementById('newCorrelati');
            s.innerHTML = docsGlobali.map(d => `<option value="${d.id}" ${selezionati.includes(d.id) ? 'selected' : ''}>${d.titolo}</option>`).join('');
        }

        async function salvaOnline() {
            const file = document.getElementById('newFile').files[0];
            let pdfPath = null;
            if (file) {
                const name = `${Date.now()}_${file.name}`;
                const { data: upData, error: upErr } = await _supabase.storage.from('pdf_riservati').upload(name, file);
                if (!upErr) pdfPath = name;
            }

            const correlati = Array.from(document.getElementById('newCorrelati').selectedOptions).map(o => o.value);
            
            const payload = {
                titolo: document.getElementById('newTitolo').value,
                autore: document.getElementById('newAutore').value || "Manager",
                argomento: document.getElementById('newArg').value || "Generale",
                data: document.getElementById('newDataManuale').value || new Date().toLocaleDateString('it-IT'),
                testo_completo: document.getElementById('newTesto').value,
                correlati: correlati,
                timestamp: Date.now()
            };

            if (pdfPath) payload.pdf_url = pdfPath;
            const id = document.getElementById('editId').value;
            if (id) await _supabase.from('documenti').update(payload).eq('id', id);
            else await _supabase.from('documenti').insert([payload]);
            
            chiudiModal(); rendering();
        }

        async function preparaModifica(id) {
            const { data } = await _supabase.from('documenti').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('editId').value = data.id;
                document.getElementById('newTitolo').value = data.titolo;
                document.getElementById('newAutore').value = data.autore;
                document.getElementById('newArg').value = data.argomento;
                document.getElementById('newDataManuale').value = data.data;
                document.getElementById('newTesto').value = data.testo_completo || "";
                popolaSelettore(data.correlati || []);
                document.getElementById('modalDocumento').style.display = 'flex';
            }
        }

        function apriModal() { 
            document.getElementById('editId').value = ""; 
            document.getElementById('newTitolo').value = "";
            document.getElementById('newTesto').value = "";
            popolaSelettore([]);
            document.getElementById('modalDocumento').style.display = 'flex'; 
        }

        function chiudiModal() { document.getElementById('modalDocumento').style.display = 'none'; }

        async function eliminaDoc(id) { if(confirm("Eliminare?")) { await _supabase.from('documenti').delete().eq('id', id); rendering(); } }

        function insertTag(t) {
            const a = document.getElementById('newTesto');
            const s = a.selectionStart;
            const e = a.selectionEnd;
            a.value = a.value.substring(0, s) + `<${t}>${a.value.substring(s, e)}</${t}>` + a.value.substring(e);
        }
    </script>
</body>
</html>
