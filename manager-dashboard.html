<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Manager - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .wrapper-correlati { display: flex; gap: 15px; margin-top: 10px; height: 450px; }
        .container-tabella-correlati { flex: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .anteprima-embed { flex: 1.5; border: 1px solid #003366; border-radius: 8px; background: #eee; overflow: hidden; }
        .anteprima-embed embed { width: 100%; height: 100%; border: none; }
        .tabella-correlati { width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: left; }
        .tabella-correlati th, .tabella-correlati td { padding: 10px; border-bottom: 1px solid #eee; }
        .tabella-correlati tr.selected { background-color: #e3f2fd; }
        .upload-box { margin: 15px 0; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; }
    </style>
</head>
<body class="home-page">
    <header>
        <a href="index.html" class="btn-back">← Torna alla lista</a>
        <h1>Gestione Documentale Manager</h1>
        <div class="header-contacts-extreme">
            <a href="index.html" class="login-sub-link" style="color: #ff4d4d !important;">Esci (Manager)</a>
        </div>
    </header>

    <main>
        <div class="grid-dashboard" id="main-grid"></div>

        <div id="modalDocumento" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; justify-content:center; align-items:center;">
            <div class="volume-section" style="max-width: 1100px; width: 95%; background: white; padding: 25px; border-radius: 20px;">
                <h3 id="modalTitle" style="text-align:center; color: #003366;">Gestione Documento</h3>
                <input type="hidden" id="editId">
                <input type="text" id="newTitolo" placeholder="Titolo" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">
                
                <div style="display: flex; gap: 10px; margin-bottom:10px;">
                    <input type="text" id="newAutore" placeholder="Autore" style="flex:1; padding:12px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="newArg" placeholder="Argomento" style="flex:1; padding:12px; border-radius:8px; border:1px solid #ddd;">
                </div>
                <input type="text" id="newDataManuale" placeholder="Data (es. 08/03/2026)" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;">

                <div class="wrapper-correlati">
                    <div class="container-tabella-correlati">
                        <table class="tabella-correlati">
                            <thead><tr><th>Sel.</th><th>Titolo</th><th>Data</th></tr></thead>
                            <tbody id="corpoTabellaCorrelati"></tbody>
                        </table>
                    </div>
                    <div class="anteprima-embed" id="areaAnteprima">
                        <div style="display:flex; height:100%; align-items:center; justify-content:center; color:#999; text-align:center;">Seleziona un documento per lo zoom</div>
                    </div>
                </div>

                <div class="upload-box">
                    <label style="font-size:0.85rem; font-weight:bold;">Carica PDF:</label>
                    <input type="file" id="newFile" accept=".pdf" style="width:100%;">
                </div>

                <div style="display:flex; gap:15px;">
                    <button onclick="salvaOnline()" style="background:#28a745; flex:2; color:white; padding:14px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Salva Online</button>
                    <button onclick="chiudiModal()" style="background:#6c757d; flex:1; color:white; padding:14px; border:none; border-radius:8px; cursor:pointer;">Annulla</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://ovfufqbpgxpmfxpbhjfn.supabase.co', 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz');
        let docsGlobali = [];
        let correlatiSelezionati = [];

        window.onload = rendering;

        async function rendering() {
            const { data } = await _supabase.from('documenti').select('*').order('timestamp', { ascending: false });
            docsGlobali = data || [];
            const grid = document.getElementById('main-grid');
            grid.innerHTML = `<div class="card" onclick="apriModal()" style="border:2px dashed #28a745; cursor:pointer;"><h3>+ Aggiungi Nuovo</h3></div>` + 
                docsGlobali.map(d => `
                <div class="card">
                    <button onclick="eliminaDoc('${d.id}')" style="position:absolute; top:10px; right:10px; border:none; background:none; cursor:pointer; color:#d9534f;">✕</button>
                    <h3>${d.titolo}</h3>
                    <p>${d.argomento} • ${d.autore}<br><strong>${d.data}</strong></p>
                    <button onclick="preparaModifica('${d.id}')" style="background:#003366; color:white; padding:10px; width:100%; border:none; border-radius:8px; cursor:pointer; margin-top:auto;">Gestione →</button>
                </div>`).join('');
        }

        // SVUOTA CAMPI AUTOMATICI
        function apriModal() {
            document.getElementById('editId').value = ""; 
            document.getElementById('newTitolo').value = "";
            document.getElementById('newAutore').value = ""; 
            document.getElementById('newArg').value = "";    
            document.getElementById('newDataManuale').value = "";
            correlatiSelezionati = [];
            popolaTabellaCorrelati([]);
            document.getElementById('areaAnteprima').innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; color:#999;">Seleziona un file</div>';
            document.getElementById('modalDocumento').style.display = 'flex';
        }

        async function caricaAnteprima(id) {
            const { data } = await _supabase.from('documenti').select('pdf_url').eq('id', id).single();
            if (data?.pdf_url) {
                const { data: url } = _supabase.storage.from('pdf_riservati').getPublicUrl(data.pdf_url);
                document.getElementById('areaAnteprima').innerHTML = `<embed src="${url.publicUrl}" type="application/pdf" width="100%" height="100%" />`;
            }
        }

        function popolaTabellaCorrelati(selezionati = []) {
            correlatiSelezionati = selezionati;
            document.getElementById('corpoTabellaCorrelati').innerHTML = docsGlobali
                .filter(d => d.id !== document.getElementById('editId').value)
                .map(d => `
                    <tr class="${correlatiSelezionati.includes(d.id) ? 'selected' : ''}" onclick="toggleSelezione('${d.id}')">
                        <td><input type="checkbox" ${correlatiSelezionati.includes(d.id) ? 'checked' : ''}></td>
                        <td>${d.titolo}</td>
                        <td>${d.data}</td>
                    </tr>`).join('');
        }

        function toggleSelezione(id) {
            const idx = correlatiSelezionati.indexOf(id);
            if (idx > -1) correlatiSelezionati.splice(idx, 1);
            else correlatiSelezionati.push(id);
            popolaTabellaCorrelati(correlatiSelezionati);
            caricaAnteprima(id);
        }

        async function salvaOnline() {
            const file = document.getElementById('newFile').files[0];
            let pdfPath = null;
            if (file) {
                const name = `${Date.now()}_${file.name}`;
                await _supabase.storage.from('pdf_riservati').upload(name, file);
                pdfPath = name;
            }
            const payload = {
                titolo: document.getElementById('newTitolo').value,
                autore: document.getElementById('newAutore').value,
                argomento: document.getElementById('newArg').value,
                data: document.getElementById('newDataManuale').value || new Date().toLocaleDateString('it-IT'),
                correlati: correlatiSelezionati,
                timestamp: Date.now()
            };
            if (pdfPath) payload.pdf_url = pdfPath;
            const id = document.getElementById('editId').value;
            if (id) await _supabase.from('documenti').update(payload).eq('id', id);
            else await _supabase.from('documenti').insert([payload]);
            chiudiModal(); rendering();
        }

        async function preparaModifica(id) {
            const { data } = await _supabase.from('documenti').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('editId').value = data.id;
                document.getElementById('newTitolo').value = data.titolo;
                document.getElementById('newAutore').value = data.autore;
                document.getElementById('newArg').value = data.argomento;
                document.getElementById('newDataManuale').value = data.data;
                popolaTabellaCorrelati(data.correlati || []);
                if(data.pdf_url) caricaAnteprima(id);
                document.getElementById('modalDocumento').style.display = 'flex';
            }
        }

        function chiudiModal() { document.getElementById('modalDocumento').style.display = 'none'; }
        async function eliminaDoc(id) { if(confirm("Eliminare?")) { await _supabase.from('documenti').delete().eq('id', id); rendering(); } }
    </script>
</body>
</html>
