<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Area Manager - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .toolbar { display: flex; gap: 5px; background: #f8f9fa; padding: 8px; border: 1px solid #ddd; border-bottom: none; border-radius: 8px 8px 0 0; margin-top: 10px; }
        .toolbar button { padding: 5px 10px; cursor: pointer; background: white; border: 1px solid #ccc; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        #modalDocumento { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center; }
        
        .wrapper-correlati { display: flex; gap: 15px; margin-top: 10px; align-items: flex-start; }
        .container-tabella-correlati { flex: 2; max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .anteprima-correlato { flex: 1; border: 1px solid #003366; border-radius: 8px; background: #f0f4f8; padding: 15px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; font-size: 0.85rem; }

        .tabella-correlati { width: 100%; border-collapse: collapse; font-size: 0.8rem; text-align: left; }
        .tabella-correlati thead { background: #f1f1f1; position: sticky; top: 0; z-index: 10; }
        .tabella-correlati th, .tabella-correlati td { padding: 10px; border-bottom: 1px solid #eee; }
        .tabella-correlati tr:hover { background-color: #f1faff; cursor: pointer; }
        .tabella-correlati tr.selected { background-color: #e3f2fd; }
    </style>
</head>

<body class="home-page">
    <header>
        <h1 style="margin: 0;">Movimento per la riqualificazione<br> dell'ospedale di Cremona</h1>
        <div class="header-contacts-extreme">
            <a href="#" onclick="logout()" class="contact-item" style="background:#d9534f;">Esci Manager 🚪</a>
        </div>
    </header>

    <main>
        <div class="grid-dashboard" id="main-grid"></div>

        <div id="modalDocumento">
            <div class="volume-section" style="max-width: 900px; width: 95%; padding: 30px; border-radius: 20px; background: white;">
                <h3 id="modalTitle" style="margin:0; text-align:center;">Gestione Documento</h3>
                <input type="hidden" id="editId">
                
                <input type="text" id="newTitolo" placeholder="Titolo" style="width:100%; margin:15px 0 8px 0; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="newAutore" placeholder="Autore" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="newArg" placeholder="Argomento" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                </div>

                <div style="text-align: left;">
                    <label style="font-size: 0.8rem; color: #666; font-weight: bold;">Collega e Anteprima (Clicca la riga per l'anteprima):</label>
                    <div class="wrapper-correlati">
                        <div class="container-tabella-correlati">
                            <table class="tabella-correlati">
                                <thead>
                                    <tr>
                                        <th style="width: 20px;">Sel.</th>
                                        <th onclick="ordinaTabella('titolo')" style="cursor:pointer;">Titolo ↕</th>
                                        <th onclick="ordinaTabella('data')" style="cursor:pointer;">Data ↕</th>
                                    </tr>
                                </thead>
                                <tbody id="corpoTabellaCorrelati"></tbody>
                            </table>
                        </div>
                        <div class="anteprima-correlato" id="boxAnteprima">
                            <p style="color: #999;">Seleziona un documento dalla lista</p>
                        </div>
                    </div>
                </div>

                <div class="toolbar" style="margin-top: 15px;">
                    <button onclick="insertTag('h3')">Titolo</button>
                    <button onclick="insertTag('ul')">Elenco</button>
                    <button onclick="insertTag('li')">Punto</button>
                </div>
                <textarea id="newTesto" placeholder="Contenuto..." style="width:100%; padding:12px; border:1px solid #ddd; height: 120px; box-sizing:border-box; border-radius: 0 0 8px 8px;"></textarea>

                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="salvaOnline()" class="contact-item" style="background:#28a745; flex:1; justify-content:center; border:none; cursor:pointer; padding: 12px;">Salva Online</button>
                    <button onclick="chiudiModal()" class="contact-item" style="background:#6c757d; flex:1; justify-content:center; border:none; cursor:pointer; padding: 12px;">Annulla</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const _supabase = supabase.createClient('https://ovfufqbpgxpmfxpbhjfn.supabase.co', 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz');
        let docsGlobali = [];
        let correlatiSelezionati = [];
        let ordineCorrente = { colonna: 'timestamp', crescente: false };

        window.onload = async function () {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.replace("login.html"); return; }
            rendering();
        }

        async function logout() { await _supabase.auth.signOut(); window.location.replace("index.html"); }

        async function rendering() {
            const { data } = await _supabase.from('documenti').select('*').order('timestamp', { ascending: false });
            docsGlobali = data || [];
            const grid = document.getElementById('main-grid');
            let html = `<div class="card" onclick="apriModal()" style="cursor:pointer; border: 2px dashed #28a745; background:white; padding:20px; text-align:center;"><h2>➕</h2><h3>Nuovo</h3></div>`;
            if (data) {
                html += data.map(d => `
                    <div class="card" style="padding:15px; text-align:center; position:relative;">
                        <button onclick="eliminaDoc('${d.id}')" style="position:absolute; top:10px; right:10px; background:#d9534f; color:white; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer;">✕</button>
                        <div style="font-size: 2rem;">📄</div>
                        <h3 style="font-size:1.1rem;">${d.titolo}</h3>
                        <p style="font-size:0.8rem;">${d.argomento}<br>Data: ${d.data}</p>
                        <button onclick="preparaModifica('${d.id}')" class="contact-item" style="width:100%; justify-content:center; background:#003366; margin-top:auto;">Gestione →</button>
                    </div>`).join('');
            }
            grid.innerHTML = html;
        }

        async function mostraAnteprima(id) {
            const box = document.getElementById('boxAnteprima');
            box.innerHTML = "Caricamento...";
            
            const { data: d } = await _supabase.from('documenti').select('*').eq('id', id).single();
            if (d) {
                box.innerHTML = `
                    <h4 style="margin: 0 0 10px 0; color: #003366;">Anteprima</h4>
                    <p style="margin: 3px 0;"><strong>Autore:</strong> ${d.autore}</p>
                    <p style="margin: 3px 0;"><strong>Argomento:</strong> ${d.argomento}</p>
                    <p style="margin: 3px 0; margin-bottom: 10px;"><strong>Data:</strong> ${d.data}</p>
                    <a href="documento.html?id=${d.id}" target="_blank" style="padding: 6px 12px; background: #003366; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.75rem;">Apri Documento ↗</a>
                `;
            }
        }

        function toggleSelezione(id) {
            const index = correlatiSelezionati.indexOf(id);
            const row = document.getElementById(`row-${id}`);
            const checkbox = document.getElementById(`check-${id}`);
            
            if (index > -1) {
                correlatiSelezionati.splice(index, 1);
                row.classList.remove('selected');
                checkbox.checked = false;
            } else {
                correlatiSelezionati.push(id);
                row.classList.add('selected');
                checkbox.checked = true;
            }
            mostraAnteprima(id);
        }

        function popolaTabellaCorrelati(selezionati = []) {
            correlatiSelezionati = selezionati;
            const corpo = document.getElementById('corpoTabellaCorrelati');
            const currentId = document.getElementById('editId').value;
            corpo.innerHTML = docsGlobali
                .filter(d => d.id !== currentId)
                .map(d => {
                    const isSelected = correlatiSelezionati.includes(d.id);
                    return `
                        <tr id="row-${d.id}" class="${isSelected ? 'selected' : ''}" onclick="toggleSelezione('${d.id}')">
                            <td><input type="checkbox" id="check-${d.id}" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleSelezione('${d.id}')"></td>
                            <td>${d.titolo}</td>
                            <td>${d.data || '-'}</td>
                        </tr>
                    `;
                }).join('');
        }

        function ordinaTabella(colonna) {
            if (ordineCorrente.colonna === colonna) { ordineCorrente.crescente = !ordineCorrente.crescente; } 
            else { ordineCorrente.colonna = colonna; ordineCorrente.crescente = true; }

            docsGlobali.sort((a, b) => {
                let valA = (a[colonna] || "").toString().toLowerCase();
                let valB = (b[colonna] || "").toString().toLowerCase();
                if (colonna === 'data' && a.data.includes('/')) {
                    const conv = (d) => new Date(d.split('/')[2], d.split('/')[1]-1, d.split('/')[0]).getTime();
                    valA = conv(a.data); valB = conv(b.data);
                }
                return (valA < valB ? -1 : 1) * (ordineCorrente.crescente ? 1 : -1);
            });
            popolaTabellaCorrelati(correlatiSelezionati);
        }

        async function salvaOnline() {
            const currentId = document.getElementById('editId').value;
            const payload = {
                titolo: document.getElementById('newTitolo').value,
                autore: document.getElementById('newAutore').value || "Manager",
                argomento: document.getElementById('newArg').value || "Generale",
                data: document.getElementById('newDataManuale').value || new Date().toLocaleDateString('it-IT'),
                testo_completo: document.getElementById('newTesto').value,
                correlati: correlatiSelezionati,
                timestamp: Date.now()
            };

            let finalId = currentId;
            if (currentId) { await _supabase.from('documenti').update(payload).eq('id', currentId); } 
            else { const { data } = await _supabase.from('documenti').insert([payload]).select(); if (data) finalId = data[0].id; }
            
            if (finalId && correlatiSelezionati.length > 0) {
                for (const otherId of correlatiSelezionati) {
                    const { data: otherDoc } = await _supabase.from('documenti').select('correlati').eq('id', otherId).single();
                    if (otherDoc) {
                        let existing = otherDoc.correlati || [];
                        if (!existing.includes(finalId)) { existing.push(finalId); await _supabase.from('documenti').update({ correlati: existing }).eq('id', otherId); }
                    }
                }
            }
            chiudiModal(); rendering();
        }

        async function preparaModifica(id) {
            const { data } = await _supabase.from('documenti').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('modalTitle').innerText = "Modifica Documento";
                document.getElementById('editId').value = data.id;
                document.getElementById('newTitolo').value = data.titolo;
                document.getElementById('newAutore').value = data.autore;
                document.getElementById('newArg').value = data.argomento;
                document.getElementById('newTesto').value = data.testo_completo || "";
                popolaTabellaCorrelati(data.correlati || []);
                document.getElementById('modalDocumento').style.display = 'flex';
                document.getElementById('boxAnteprima').innerHTML = '<p style="color: #999;">Seleziona un documento</p>';
            }
        }

        function apriModal() {
            document.getElementById('modalTitle').innerText = "Nuovo Documento";
            document.getElementById('editId').value = ""; document.getElementById('newTitolo').value = ""; document.getElementById('newTesto').value = "";
            popolaTabellaCorrelati([]); document.getElementById('modalDocumento').style.display = 'flex';
        }

        function chiudiModal() { document.getElementById('modalDocumento').style.display = 'none'; }
        async function eliminaDoc(id) { if(confirm("Eliminare?")) { await _supabase.from('documenti').delete().eq('id', id); rendering(); } }
        function insertTag(t) { const a = document.getElementById('newTesto'); a.value += `<${t}></${t}>`; }
    </script>
</body>
</html>
