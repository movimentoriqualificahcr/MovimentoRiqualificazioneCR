<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Area Manager - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="home-page">
    <header>
        <h1>Area Manager - Ospedale Cremona</h1>
    </header>
    <main>
        <div class="grid-dashboard" id="main-grid"></div>
        <div id="modalDocumento"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center;">
            <div style="background:white; padding:30px; border-radius:20px; width:90%; max-width:650px;">
                <h3 id="modalTitle">Gestione Documento Online</h3>
                <input type="hidden" id="editId">
                <input type="text" id="newTitolo" placeholder="Titolo"
                    style="width:100%; margin-bottom:10px; padding:10px;">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" id="newAutore" placeholder="Autore" style="flex:1; padding:10px;">
                    <input type="text" id="newArg" placeholder="Argomento" style="flex:1; padding:10px;">
                </div>
                <input type="text" id="newData" placeholder="Data (es: 05/03/2026)"
                    style="width:100%; margin-bottom:10px; padding:10px;">
                <textarea id="newTesto" placeholder="Contenuto..."
                    style="width:100%; height:250px; padding:10px; font-family:inherit;"></textarea>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button onclick="salvaOnline()"
                        style="background:#28a745; color:white; flex:1; padding:12px; border:none; cursor:pointer; border-radius:8px;">Salva
                        Online</button>
                    <button onclick="chiudiModal()"
                        style="background:#6c757d; color:white; flex:1; padding:12px; border:none; cursor:pointer; border-radius:8px;">Annulla</button>
                </div>
            </div>
        </div>
    </main>
    <script>
        const SUPABASE_URL = 'https://ovfufqbpgxpmfxpbhjfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz			'; // Copiala da image_31baa6.png
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function caricaDati() {
            const { data } = await _supabase.from('documenti').select('*').order('timestamp', { ascending: false });
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '<div class="card" onclick="apriModal()" style="cursor:pointer; text-align:center;"><h2>➕</h2><h3>Aggiungi Nuovo</h3></div>';
            if (data) {
                data.forEach(d => {
                    grid.innerHTML += `
                    <div class="card" style="position:relative; text-align:center; padding:15px;">
                        <button onclick="eliminaDoc('${d.id}')" style="position:absolute; top:10px; right:10px; background:#d9534f; color:white; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer;">✕</button>
                        <h3>${d.titolo}</h3>
                        <p>${d.argomento}<br>${d.autore}<br>${d.data}</p>
                        <button onclick="preparaModifica('${d.id}')" style="background:#003366; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer; width:100%;">Gestione →</button>
                    </div>`;
                });
            }
        }

        async function salvaOnline() {
            const id = document.getElementById('editId').value;
            const payload = {
                titolo: document.getElementById('newTitolo').value,
                autore: document.getElementById('newAutore').value,
                argomento: document.getElementById('newArg').value,
                data: document.getElementById('newData').value,
                testo_completo: document.getElementById('newTesto').value,
                timestamp: Date.now()
            };
            if (id) { await _supabase.from('documenti').update(payload).eq('id', id); }
            else { await _supabase.from('documenti').insert([payload]); }
            chiudiModal(); caricaDati();
        }

        async function eliminaDoc(id) { if (confirm("Eliminare?")) { await _supabase.from('documenti').delete().eq('id', id); caricaDati(); } }
        async function preparaModifica(id) {
            const { data } = await _supabase.from('documenti').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('editId').value = data.id;
                document.getElementById('newTitolo').value = data.titolo;
                document.getElementById('newAutore').value = data.autore;
                document.getElementById('newArg').value = data.argomento;
                document.getElementById('newData').value = data.data;
                document.getElementById('newTesto').value = data.testo_completo;
                document.getElementById('modalDocumento').style.display = 'flex';
            }
        }
        function apriModal() { document.getElementById('editId').value = ""; document.getElementById('modalDocumento').style.display = 'flex'; }
        function chiudiModal() { document.getElementById('modalDocumento').style.display = 'none'; }
        window.onload = caricaDati;
    </script>
</body>

</html>
