<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Area Manager - Ospedale Cremona</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding-top: 120px; }
        header { background: #003366; color: white; padding: 20px 0; position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: center; align-items: center; min-height: 100px; }
        header h1 { margin: 0; font-size: 1.4rem; text-align: center; }
        .btn-back { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: white !important; border: 1.5px solid white; padding: 10px 22px; border-radius: 50px; text-decoration: none; font-weight: bold; }
        .grid-dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; text-align: center; position: relative; min-height: 200px; display: flex; flex-direction: column; align-items: center; }
        #modalDocumento { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:2000; justify-content:center; align-items:center; }
        .volume-section { background: white; padding: 30px; border-radius: 20px; width: 95%; max-width: 1100px; max-height: 90vh; overflow-y: auto; }
        .wrapper-correlati { display: flex; gap: 15px; height: 350px; margin-top: 10px; }
        .container-tabella-correlati { flex: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        .anteprima-embed { flex: 1.5; border: 1px solid #003366; border-radius: 8px; background: #eee; overflow: hidden; }
        .anteprima-embed embed { width: 100%; height: 100%; border: none; }
        .tabella-correlati { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .tabella-correlati th, .tabella-correlati td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
        .tabella-correlati tr.selected { background-color: #e3f2fd; }
        .upload-box { margin: 15px 0; background: #f8f9fa; padding: 10px; border: 1px dashed #ccc; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="btn-back">← Torna alla lista</a>
        <h1>Gestione Documentale Manager</h1>
    </header>
    <main>
        <div class="grid-dashboard" id="main-grid"></div>
        <div id="modalDocumento">
            <div class="volume-section">
                <h3 id="modalTitle" style="text-align:center;">Gestione Documento</h3>
                <input type="hidden" id="editId">
                <input type="text" id="newTitolo" placeholder="Titolo" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box; border-radius:8px; border:1px solid #ddd;">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="newAutore" placeholder="Autore" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                    <input type="text" id="newArg" placeholder="Argomento" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
                </div>
                <input type="text" id="newDataManuale" placeholder="Data (es. 08/03/2026)" style="width:100%; padding:10px; margin: 10px 0; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;">
                <div class="wrapper-correlati">
                    <div class="container-tabella-correlati">
                        <table class="tabella-correlati">
                            <thead><tr><th>Sel.</th><th>Titolo</th><th>Data</th></tr></thead>
                            <tbody id="corpoTabellaCorrelati"></tbody>
                        </table>
                    </div>
                    <div class="anteprima-embed" id="areaAnteprima">
                         <div style="display:flex; height:100%; align-items:center; justify-content:center; color:#999;">Seleziona un file per l'anteprima</div>
                    </div>
                </div>
                <div class="upload-box">
                    <label style="font-size:0.8rem; font-weight:bold;">Allega PDF:</label>
                    <input type="file" id="newFile" accept=".pdf" style="width:100%;">
                </div>
                <div style="display:flex; gap:10px;">
                    <button onclick="salvaOnline()" style="background:#28a745; color:white; flex:1; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Salva Online</button>
                    <button onclick="chiudiModal()" style="background:#6c757d; color:white; flex:1; padding:12px; border:none; border-radius:8px; cursor:pointer;">Annulla</button>
                </div>
            </div>
        </div>
    </main>
    <script>
        const _supabase = supabase.createClient('https://ovfufqbpgxpmfxpbhjfn.supabase.co', 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz');
        let docsGlobali = [];
        let correlatiSelezionati = [];

        window.onload = rendering;

        async function rendering() {
            const { data } = await _supabase.from('documenti').select('*').order('timestamp', { ascending: false });
            docsGlobali = data || [];
            const grid = document.getElementById('main-grid');
            grid.innerHTML = `<div class="card" onclick="apriModal()" style="border:2px dashed #28a745; cursor:pointer; justify-content:center;"><span style="font-size:2rem; color:#28a745;">+</span><h3 style="color:#28a745;">Aggiungi Nuovo</h3></div>` + 
                docsGlobali.map(d => `
                <div class="card">
                    <button onclick="eliminaDoc('${d.id}')" style="position:absolute; top:10px; right:10px; border:none; background:none; cursor:pointer; color:#d9534f;">✕</button>
                    <div style="font-size:2rem; margin-bottom:10px;">📄</div>
                    <h3>${d.titolo}</h3>
                    <p>${d.argomento}<br>${d.autore}<br><strong>${d.data}</strong></p>
                    <button onclick="preparaModifica('${d.id}')" style="background:#003366; color:white; padding:10px; width:100%; border:none; border-radius:8px; cursor:pointer; margin-top:auto;">Gestione →</button>
                </div>`).join('');
        }

        function apriModal() {
            document.getElementById('editId').value = ""; 
            document.getElementById('newTitolo').value = "";
            document.getElementById('newAutore').value = ""; // Svuota Autore
            document.getElementById('newArg').value = "";    // Svuota Argomento
            document.getElementById('newDataManuale').value = "";
            correlatiSelezionati = [];
            popolaTabellaCorrelati([]);
            document.getElementById('areaAnteprima').innerHTML = '<div style="display:flex; height:100%; align-items:center; justify-content:center; color:#999;">Seleziona un file</div>';
            document.getElementById('modalDocumento').style.display = 'flex';
        }

        async function caricaAnteprima(id) {
            const { data } = await _supabase.from('documenti').select('pdf_url').eq('id', id).single();
            if (data?.pdf_url) {
                const { data: url } = _supabase.storage.from('pdf_riservati').getPublicUrl(data.pdf_url);
                // Abilita zoom nativo
                document.getElementById('areaAnteprima').innerHTML = `<embed src="${url.publicUrl}" type="application/pdf" width="100%" height="100%" />`;
            }
        }

        function popolaTabellaCorrelati(selezionati = []) {
            correlatiSelezionati = selezionati;
            document.getElementById('corpoTabellaCorrelati').innerHTML = docsGlobali
                .filter(d => d.id !== document.getElementById('editId').value)
                .map(d => `
                    <tr id="row-${d.id}" class="${correlatiSelezionati.includes(d.id) ? 'selected' : ''}" onclick="toggleSelezione('${d.id}')">
                        <td><input type="checkbox" ${correlatiSelezionati.includes(d.id) ? 'checked' : ''}></td>
                        <td>${d.titolo}</td>
                        <td>${d.data}</td>
                    </tr>`).join('');
        }

        function toggleSelezione(id) {
            const idx = correlatiSelezionati.indexOf(id);
            if (idx > -1) correlatiSelezionati.splice(idx, 1);
            else correlatiSelezionati.push(id);
            popolaTabellaCorrelati(correlatiSelezionati);
            caricaAnteprima(id);
        }

        async function salvaOnline() {
            const file = document.getElementById('newFile').files[0];
            let pdfPath = null;
            if (file) {
                const name = `${Date.now()}_${file.name}`;
                await _supabase.storage.from('pdf_riservati').upload(name, file);
                pdfPath = name;
            }
            const payload = {
                titolo: document.getElementById('newTitolo').value,
                autore: document.getElementById('newAutore').value,
                argomento: document.getElementById('newArg').value,
                data: document.getElementById('newDataManuale').value || new Date().toLocaleDateString('it-IT'),
                correlati: correlatiSelezionati,
                timestamp: Date.now()
            };
            if (pdfPath) payload.pdf_url = pdfPath;
            const id = document.getElementById('editId').value;
            if (id) await _supabase.from('documenti').update(payload).eq('id', id);
            else await _supabase.from('documenti').insert([payload]);
            chiudiModal(); rendering();
        }

        async function preparaModifica(id) {
            const { data } = await _supabase.from('documenti').select('*').eq('id', id).single();
            if (data) {
                document.getElementById('editId').value = data.id;
                document.getElementById('newTitolo').value = data.titolo;
                document.getElementById('newAutore').value = data.autore;
                document.getElementById('newArg').value = data.argomento;
                document.getElementById('newDataManuale').value = data.data;
                popolaTabellaCorrelati(data.correlati || []);
                if(data.pdf_url) caricaAnteprima(id);
                document.getElementById('modalDocumento').style.display = 'flex';
            }
        }

        function chiudiModal() { document.getElementById('modalDocumento').style.display = 'none'; }
        async function eliminaDoc(id) { if(confirm("Eliminare?")) { await _supabase.from('documenti').delete().eq('id', id); rendering(); } }
    </script>
</body>
</html>
