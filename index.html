<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso - Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gate-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
            gap: 30px;
            padding: 20px;
        }
        .gate-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px;
            transition: transform 0.3s;
            border: 1px solid #eee;
        }
        .gate-card:hover { transform: translateY(-10px); border-color: #003366; }
        .gate-icon { font-size: 4rem; margin-bottom: 20px; display: block; }
        .btn-gate {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background: #003366;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body class="home-page">
    <header>
        <div class="header-titles">
            <h1>Movimento per la riqualificazione dell'ospedale di Cremona</h1>
        </div>
    </header>
    <main class="gate-container">
        <div class="gate-card">
            <span class="gate-icon">👥</span>
            <h2>Accesso Utente</h2>
            <p>Consulta la documentazione pubblica.</p>
            <a href="dashboard.html" onclick="localStorage.setItem('role', 'user')" class="btn-gate">Entra come Utente</a>
        </div>
        <div class="gate-card">
            <span class="gate-icon">🔐</span>
            <h2>Area Manager</h2>
            <p>Accesso riservato alla gestione tecnica.</p>
            <a href="login.html" class="btn-gate">Accedi come Manager</a>
        </div>
    </main>
</body>
</html>
