<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Movimento Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="home-page">
    <header>
        <h1>Movimento per la riqualificazione dell'ospedale di Cremona</h1>
        <div style="text-align: right; padding: 10px;">
            <a href="manager-dashboard.html" style="color: white; font-size: 0.8rem; text-decoration: none;">Area
                Manager</a>
        </div>
    </header>

    <main>
        <div class="grid-dashboard" id="main-grid" style="margin-top: 20px;"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://ovfufqbpgxpmfxpbhjfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function rendering() {
            const { data, error } = await _supabase.from('documenti').select('*').order('timestamp', { ascending: false });
            const grid = document.getElementById('main-grid');

            if (data && data.length > 0) {
                grid.innerHTML = data.map(d => `
                    <div class="card" style="padding: 15px; min-height: 200px; display: flex; flex-direction: column; align-items: center; text-align: center; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                        <div style="font-size: 2.2rem; margin-bottom: 10px;">📄</div>
                        <h3 style="margin: 5px 0; font-size: 1.1rem;">${d.titolo}</h3>
                        <p style="color: #666; font-size: 0.8rem; margin-bottom: 10px;"><strong>${d.argomento}</strong><br>${d.autore}<br><span style="color: #999;">Data: ${d.data}</span></p>
                        <a href="documento.html?id=${d.id}" class="contact-item" style="margin-top: auto; padding: 8px 15px; font-size: 0.85rem; width: 100%; justify-content: center; background: #003366; border: none; text-decoration: none; color: white; border-radius: 5px;">Consulta →</a>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = "<h3 style='grid-column: 1/-1; text-align:center;'>Nessun documento disponibile online.</h3>";
            }
        }

        window.onload = rendering;
    </script>
</body>

</html>
