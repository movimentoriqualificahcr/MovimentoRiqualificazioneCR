<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Movimento Ospedale Cremona</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="home-page">
    <header>
        <h1>Movimento per la riqualificazione dell'ospedale di Cremona</h1>
    </header>
    <main>
        <div class="grid-dashboard" id="main-grid" style="margin-top: 20px;"></div>
    </main>
    <script>
        const SUPABASE_URL = 'https://ovfufqbpgxpmfxpbhjfn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WvKdPIkgPeXv8AIB6eW8VQ_B9DATrKz'; // Stessa chiave di prima
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function rendering() {
            const { data } = await _supabase.from('documenti').select('*').order('timestamp', { ascending: false });
            const grid = document.getElementById('main-grid');
            if (data && data.length > 0) {
                grid.innerHTML = data.map(d => `
                    <div class="card" style="text-align: center; padding: 15px; min-height: 200px; display: flex; flex-direction: column; align-items: center;">
                        <div style="font-size: 2.2rem;">📄</div>
                        <h3>${d.titolo}</h3>
                        <p>${d.argomento}<br>${d.autore}<br>Data: ${d.data}</p>
                        <a href="documento.html?id=${d.id}" class="contact-item" style="background:#003366; color:white; text-decoration:none; padding:10px; border-radius:5px; margin-top: auto;">Consulta →</a>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = "<h3>Nessun documento disponibile online.</h3>";
            }
        }
        window.onload = rendering;
    </script>
</body>

</html>
